<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Admin Alma | almaMobiiee</title>

<style>
:root{
  --red:#e30613;
  --dark:#111827;
  --muted:#64748b;
  --line:#e5e7eb;
  --bg:#f5f6f8;
  --white:#fff;
  --green:#15803d;
  --orange:#b45309;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--dark)
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}

/* LOGIN */
.login-screen{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px
}
.login-card{
  width:min(430px,100%);
  padding:34px;
  border-radius:26px;
  background:#fff;
  box-shadow:0 30px 90px rgba(0,0,0,.13)
}
.brand{
  color:var(--red);
  font-weight:900;
  font-size:13px
}
.login-card h1{
  margin:12px 0 7px;
  font-size:38px
}
.login-card p{color:var(--muted)}
label{
  display:block;
  margin:15px 0;
  font-size:12px;
  font-weight:800
}
input,select,textarea{
  width:100%;
  margin-top:7px;
  padding:12px 13px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  outline:none
}
textarea{
  min-height:100px;
  resize:vertical
}
input:focus,select:focus,textarea:focus{
  border-color:var(--red)
}
.primary{
  width:100%;
  padding:14px;
  border:0;
  border-radius:10px;
  background:var(--red);
  color:#fff;
  font-weight:900
}
.error{color:#b91c1c}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  z-index:30;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  padding:15px 24px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(15px)
}
.topbar strong,.topbar small{display:block}
.topbar small{
  margin-top:3px;
  color:var(--muted)
}
.logout{
  padding:9px 15px;
  border:1px solid var(--line);
  border-radius:9px;
  background:#fff
}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:235px 1fr;
  min-height:calc(100vh - 68px)
}
.sidebar{
  padding:20px 12px;
  border-right:1px solid var(--line);
  background:#fff
}
.sidebar-title{
  padding:7px 12px 12px;
  color:var(--muted);
  font-size:10px;
  font-weight:900;
  text-transform:uppercase
}
.nav{
  width:100%;
  margin-bottom:5px;
  padding:12px 13px;
  border:0;
  border-radius:9px;
  background:transparent;
  text-align:left;
  font-weight:800
}
.nav:hover,.nav.active{
  background:#fff1f2;
  color:var(--red)
}
.main{
  min-width:0;
  padding:30px
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:28px
}
.stat{
  padding:18px;
  border:1px solid var(--line);
  border-radius:17px;
  background:#fff
}
.stat small{
  display:block;
  color:var(--muted)
}
.stat strong{
  display:block;
  margin-top:7px;
  font-size:29px
}

/* HEADER */
.page-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:18px
}
.page-head h1{
  margin:0;
  font-size:30px
}
.page-head p{
  margin:6px 0 0;
  color:var(--muted)
}
.add{
  padding:12px 17px;
  border:0;
  border-radius:10px;
  background:var(--red);
  color:#fff;
  font-weight:900
}
.toolbar{
  display:flex;
  gap:10px;
  margin-bottom:16px
}
.search{
  max-width:430px;
  margin:0
}

/* TABLE */
.table-wrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:17px;
  background:#fff
}
table{
  width:100%;
  min-width:950px;
  border-collapse:collapse
}
th,td{
  padding:13px;
  border-bottom:1px solid #eee;
  text-align:left;
  vertical-align:top;
  font-size:12px
}
th{
  background:#fafafa;
  color:var(--muted);
  font-size:10px;
  text-transform:uppercase
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:5px
}
.action{
  padding:7px 9px;
  border:1px solid var(--line);
  border-radius:7px;
  background:#fff;
  font-size:10px;
  font-weight:900
}
.action.verify{color:var(--green)}
.action.reject,.action.delete{color:#b91c1c}
.badge{
  display:inline-block;
  padding:5px 8px;
  border-radius:999px;
  background:#f1f5f9;
  font-size:9px;
  font-weight:900;
  text-transform:uppercase
}
.badge.verified,.badge.paid,.badge.approved,.badge.active,.badge.completed{
  background:#dcfce7;
  color:var(--green)
}
.badge.pending,.badge.pending_review,.badge.new,.badge.processing{
  background:#ffedd5;
  color:var(--orange)
}
.empty{
  padding:35px!important;
  color:var(--muted);
  text-align:center
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(15,23,42,.75)
}
.modal.active{display:flex}
.modal-card{
  width:min(720px,100%);
  max-height:92vh;
  overflow:auto;
  padding:27px;
  border-radius:22px;
  background:#fff
}
.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px
}
.modal-head h2{margin:0}
.close{
  width:38px;
  height:38px;
  border:0;
  border-radius:50%;
  background:#f1f5f9;
  font-size:20px
}
.fields{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0 14px
}
.full{grid-column:1/-1}
.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:20px
}
.cancel,.save{
  padding:11px 17px;
  border-radius:9px;
  font-weight:900
}
.cancel{
  border:1px solid var(--line);
  background:#fff
}
.save{
  border:0;
  background:var(--red);
  color:#fff
}

@media(max-width:1000px){
  .stats{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:780px){
  .layout{display:block}
  .sidebar{
    display:flex;
    overflow:auto;
    padding:10px;
    border-right:0;
    border-bottom:1px solid var(--line)
  }
  .sidebar-title{display:none}
  .nav{
    width:auto;
    white-space:nowrap
  }
  .main{padding:18px 12px}
  .page-head{
    align-items:flex-start;
    flex-direction:column
  }
  .fields{grid-template-columns:1fr}
  .full{grid-column:auto}
}
</style>
</head>

<body>

<section id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="brand">almaMobiiee × Auto2000</div>
    <h1>Admin Alma</h1>
    <p>Kelola mobil baru, accessories, pelanggan, pesanan dan pembayaran.</p>

    <form id="loginForm">
      <label>
        Email
        <input id="email" type="email" value="alma.budsteddy88@gmail.com" required>
      </label>

      <label>
        Password
        <input id="password" type="password" required>
      </label>

      <p id="loginError" class="error"></p>

      <button class="primary" type="submit">
        Login
      </button>
    </form>
  </div>
</section>

<section id="dashboard" class="hidden">

  <header class="topbar">
    <div>
      <strong>almaMobiiee Admin</strong>
      <small id="adminEmail">Administrator</small>
    </div>

    <button id="logoutButton" class="logout">
      Logout
    </button>
  </header>

  <div class="layout">

    <aside class="sidebar">

      <div class="sidebar-title">Katalog</div>

      <button class="nav active" data-col="new_cars">
        🚘 Mobil Baru
      </button>

      <button class="nav" data-col="accessories">
        🛍 Accessories
      </button>

      <div class="sidebar-title">Transaksi</div>

      <button class="nav" data-col="orders">
        📦 Pesanan
      </button>

      <button class="nav" data-col="payments">
        💳 Pembayaran
      </button>

      <div class="sidebar-title">Pelanggan</div>

      <button class="nav" data-col="mediators">
        🤝 Mediator
      </button>

      <button class="nav" data-col="used_cars">
        🚙 Mobil Second
      </button>

      <button class="nav" data-col="insurance_requests">
        🛡 Asuransi
      </button>

    </aside>

    <main class="main">

      <div class="stats">
        <div class="stat">
          <small>Mobil Baru</small>
          <strong id="countCars">0</strong>
        </div>

        <div class="stat">
          <small>Accessories</small>
          <strong id="countAccessories">0</strong>
        </div>

        <div class="stat">
          <small>Pesanan</small>
          <strong id="countOrders">0</strong>
        </div>

        <div class="stat">
          <small>Sudah Bayar</small>
          <strong id="countPaid">0</strong>
        </div>
      </div>

      <div class="page-head">
        <div>
          <h1 id="pageTitle">Mobil Baru</h1>
          <p id="pageDescription">
            Kelola katalog dan data almaMobiiee.
          </p>
        </div>

        <button id="addButton" class="add">
          + Tambah Data
        </button>
      </div>

      <div class="toolbar">
        <input
          id="searchInput"
          class="search"
          type="search"
          placeholder="Cari data..."
        >
      </div>

      <div class="table-wrap">
        <table>
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

    </main>

  </div>
</section>

<div id="crudModal" class="modal">
  <div class="modal-card">

    <div class="modal-head">
      <h2 id="modalTitle">Tambah Data</h2>
      <button id="closeModal" class="close" type="button">×</button>
    </div>

    <form id="crudForm">

      <div id="formFields" class="fields"></div>

      <div class="modal-actions">
        <button id="cancelModal" class="cancel" type="button">
          Batal
        </button>

        <button class="save" type="submit">
          Simpan
        </button>
      </div>

    </form>

  </div>
</div>

<script type="module" src="./admin.js?v=final1"></script>

</body>
</html>
