<link rel="stylesheet" href="css/alma-sms-popup.css">

<div
  id="almaSMSOverlay"
  class="alma-sms-overlay"
  aria-hidden="true"
>
  <div
    class="alma-sms-popup"
    role="dialog"
    aria-modal="true"
    aria-labelledby="almaSMSTitle"
  >
    <button
      class="alma-sms-close"
      type="button"
      onclick="closeAlmaSMSPopup()"
      aria-label="Tutup"
    >
      ×
    </button>

    <div class="alma-sms-icon">
      ✉
    </div>

    <h2 id="almaSMSTitle">
      Hubungi Alma via SMS
    </h2>

    <p>
      WhatsApp sedang mengalami kendala.
      Untuk informasi kendaraan, promo,
      aksesori, dan pemesanan, silakan
      hubungi Alma melalui SMS.
    </p>

    <div class="alma-sms-number">
      085283397198
    </div>

    <a
      id="almaSMSLink"
      class="alma-sms-btn"
      href="sms:085283397198?body=Halo%20Alma%2C%20saya%20tertarik%20dengan%20informasi%20di%20almaMobiiee."
    >
      Kirim SMS ke Alma
    </a>

    <button
      class="alma-sms-btn alma-sms-btn-secondary"
      type="button"
      onclick="closeAlmaSMSPopup()"
    >
      Lanjut Lihat Website
    </button>

    <div class="alma-sms-note">
      SMS akan dibuka melalui aplikasi pesan di perangkat Anda.
    </div>
  </div>
</div>

<button
  class="alma-sms-floating"
  type="button"
  onclick="openAlmaSMSPopup()"
>
  ✉ SMS Alma
</button>

<script src="js/alma-sms-popup.js"></script>
